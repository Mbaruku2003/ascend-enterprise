version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: ascend-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ascend
      POSTGRES_USER: ascend
      POSTGRES_PASSWORD: ascend

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascend"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:

    image: redis:7-alpine

    container_name: ascend-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data


  minio:

    image: minio/minio

    command: server /data --console-address ":9001"

    ports:

      - "9000:9000"

      - "9001:9001"

    environment:

      MINIO_ROOT_USER: ascend

      MINIO_ROOT_PASSWORD: ascendpassword

    volumes:

      - minio-data:/data


  mailpit:

    image: axllent/mailpit

    ports:

      - "1025:1025"

      - "8025:8025"


volumes:

  postgres-data:

  redis-data:

  minio-data:
